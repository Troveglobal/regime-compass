  <style>
    .timeline { max-width: 640px; margin: 0 auto; }
    .timeline-item {
      position: relative;
      padding: 0 0 0 32px;
      margin-bottom: 24px;
    }
    .timeline-item::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 0;
      bottom: -24px;
      width: 2px;
      background: var(--border);
    }
    .timeline-item:last-child::before { display: none; }
    .timeline-item::after {
      content: "";
      position: absolute;
      left: 2px;
      top: 18px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
    }
    .change-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 18px 20px;
      box-shadow: inset 0 1px 0 var(--edge-light);
      transition: var(--transition);
    }
    .change-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md), inset 0 1px 0 var(--edge-light);
    }
    .change-date {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-family: var(--font-mono);
    }
    .change-market {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-strong);
      margin-bottom: 2px;
    }
    .change-country {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .change-transition {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .regime-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .regime-pill.bull { background: var(--bull); color: #052e17; }
    .regime-pill.bear { background: var(--bear); color: #fff; }
    .regime-pill.neutral { background: var(--neutral); color: #1a1a1a; }
    .change-arrow {
      color: var(--muted);
      font-size: 16px;
      flex-shrink: 0;
    }
    .empty-state {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 40px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      max-width: 640px;
      margin: 0 auto;
    }
    .empty-state strong { color: var(--text-strong); }
    @media (max-width: 600px) {
      .change-card { padding: 14px 16px; }
      .timeline-item { padding-left: 28px; }
    }

<body>
<script src="/shell.js?v=6.7"></script>

<div class="wrap">
  <div class="hero">
    <div class="kicker">Regime Changes</div>
    <h1>What Changed</h1>
    <div class="tagline">Recent regime transitions across all markets. When models agree on a flip, pay attention.</div>
  </div>

  <section class="panel reveal" id="changes-panel">
    <div class="panel-title">Regime transitions — last 30 days</div>
    <div id="changes-container"></div>
  </section>
</div>

<script>
function formatDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" });
}

async function load() {
  const container = document.getElementById("changes-container");
  try {
    const res = await fetch("/api/changes?days=30");
    const changes = await res.json();

    if (!changes || changes.length === 0) {
      container.innerHTML = `<div class="empty-state"><strong>No regime changes in the last 30 days.</strong> Steady state.</div>`;
      return;
    }

    // Sort most recent first
    changes.sort((a, b) => b.date.localeCompare(a.date));

    let html = '<div class="timeline">';
    for (const c of changes) {
      html += `
        <div class="timeline-item">
          <div class="change-card">
            <div class="change-date">${formatDate(c.date)}</div>
            <div class="change-market">${c.index_name}</div>
            <div class="change-country">${c.country}</div>
            <div class="change-transition">
              <span class="regime-pill ${c.from}">${c.from}</span>
              <span class="change-arrow">&rarr;</span>
              <span class="regime-pill ${c.to}">${c.to}</span>
            </div>
          </div>
        </div>
      `;
    }
    html += '</div>';
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `<div class="empty-state">Failed to load changes. Try refreshing.</div>`;
  }
}

load();
</script>
</body>
