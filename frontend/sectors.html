<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>India Sector Heatmap — Regime Compass</title>
  <meta name="description" content="Daily performance of the Nifty sectoral indices — 1-day, 1-week and 1-month, in one heatmap. Updated daily." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Regime Compass" />
  <meta property="og:title" content="India Sector Heatmap — Regime Compass" />
  <meta name="theme-color" content="#07090e" />
  <link rel="canonical" href="https://www.regimecompass.com/sectors" />
  <link rel="stylesheet" href="/styles.css?v=6.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    .sec-toolbar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
    .seg { display: inline-flex; gap: 2px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-md); padding: 3px; box-shadow: inset 0 1px 0 var(--edge-light); }
    .seg button { padding: 7px 15px; border-radius: var(--r-sm); background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: var(--transition); }
    .seg button.active { background: var(--accent-dim); color: var(--accent-strong); }
    .bench { font-size: 13px; color: var(--muted); }
    .bench b { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
    .sec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(158px, 1fr)); gap: 10px; }
    .sec-tile {
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      padding: 15px 15px 13px;
      box-shadow: inset 0 1px 0 var(--edge-light);
      transition: var(--transition);
      opacity: 0; transform: translateY(10px);
      animation: card-in 0.5s var(--ease-out) forwards;
    }
    @keyframes card-in { to { opacity: 1; transform: translateY(0); } }
    .sec-tile:hover { transform: translateY(-2px); box-shadow: var(--shadow-md), inset 0 1px 0 var(--edge-light); }
    .sec-name { font-size: 13px; font-weight: 600; color: var(--text-strong); }
    .sec-main { font-size: 27px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 7px; letter-spacing: -0.02em; line-height: 1; }
    .sec-sub { font-size: 10.5px; color: var(--muted); margin-top: 8px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
    .asof { color: var(--muted); font-size: 12px; margin-top: 22px; font-family: var(--font-mono); }
  </style>
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebPage","name":"India Sector Heatmap — Regime Compass","url":"https://www.regimecompass.com/sectors","isPartOf":{"@type":"WebSite","name":"Regime Compass","url":"https://www.regimecompass.com"}}
  </script>
</head>
<body>
<script src="/shell.js?v=6.7"></script>

<div class="wrap">
  <div class="hero">
    <div class="kicker">Sector Heatmap</div>
    <h1>How are sectors moving?</h1>
    <p class="tagline">Daily performance of the Nifty sectoral indices — 1&#8209;day, 1&#8209;week and 1&#8209;month, in one heatmap. Updated daily.</p>
  </div>

  <div class="sec-toolbar">
    <div class="seg" id="seg">
      <button data-p="d1" class="active">1 Day</button>
      <button data-p="w1">1 Week</button>
      <button data-p="m1">1 Month</button>
    </div>
    <span class="bench" id="bench"></span>
  </div>

  <div class="sec-grid" id="grid"></div>
  <p class="asof" id="asof"></p>
</div>

<script>
(function(){
  var DATA=null, period="d1";
  var grid=document.getElementById("grid"), bench=document.getElementById("bench"), asof=document.getElementById("asof");
  function fmt(r){ return r==null ? "—" : (r>=0?"+":"")+r.toFixed(2)+"%"; }
  function color(r){
    if(r==null) return {bg:"var(--panel-2)", bd:"var(--border)", fg:"var(--muted)"};
    var a=Math.min(Math.abs(r)/3,1);
    return r>=0
      ? {bg:"rgba(52,198,115,"+(0.05+a*0.20)+")", bd:"rgba(52,198,115,"+(0.28+a*0.42)+")", fg:"var(--bull)"}
      : {bg:"rgba(227,84,84,"+(0.05+a*0.20)+")",  bd:"rgba(227,84,84,"+(0.28+a*0.42)+")",  fg:"var(--bear)"};
  }
  function render(){
    if(!DATA) return;
    var rows=DATA.sectors.slice().sort(function(a,b){return (b[period]==null?-99:b[period])-(a[period]==null?-99:a[period]);});
    grid.innerHTML=rows.map(function(s,i){
      var c=color(s[period]);
      return '<div class="sec-tile" style="background:'+c.bg+';border-color:'+c.bd+';animation-delay:'+(i*40)+'ms">'
        +'<div class="sec-name">'+s.label+'</div>'
        +'<div class="sec-main" style="color:'+c.fg+'">'+fmt(s[period])+'</div>'
        +'<div class="sec-sub">1D '+fmt(s.d1)+' · 1W '+fmt(s.w1)+' · 1M '+fmt(s.m1)+'</div>'
        +'</div>';
    }).join("");
    if(DATA.benchmark){ var b=DATA.benchmark; bench.innerHTML='Nifty 50 <b style="color:'+(b[period]>=0?"var(--bull)":"var(--bear)")+'">'+fmt(b[period])+'</b>'; }
    asof.textContent="As of "+new Date(DATA.as_of).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})+" · Nifty sectoral indices, NSE. Not investment advice.";
  }
  document.getElementById("seg").addEventListener("click",function(e){
    var btn=e.target.closest("button"); if(!btn) return;
    period=btn.getAttribute("data-p");
    [].forEach.call(this.children,function(x){x.classList.toggle("active",x===btn);});
    render();
  });
  fetch("/api/sectors").then(function(r){return r.ok?r.json():null;}).then(function(d){ if(d){DATA=d; render();} else grid.innerHTML='<p class="bench">Sector data is refreshing — check back shortly.</p>'; }).catch(function(){});
})();
</script>
</body>
</html>
