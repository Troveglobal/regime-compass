<body>
<script src="/shell.js?v=6.5"></script>

<div class="wrap">
  <div class="hero">
    <div class="kicker">Seasonality</div>
    <h1>Seasonality</h1>
    <div class="tagline">Monthly return patterns across eleven markets. Green months tend to be positive, red months tend to be negative. Historical average — not a prediction.</div>
    <div class="controls" style="margin-top: 18px;">
      <label for="index-select">Index</label>
      <select id="index-select"></select>
      <div id="share-container"></div>
    </div>
  </div>

  <section class="panel reveal">
    <div class="panel-title" id="heatmap-title">Monthly Returns (%)</div>
    <div class="heatmap-scroll">
      <table class="heatmap-table" id="heatmap-table">
        <thead><tr><th>Year</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <section class="panel reveal reveal-d1">
    <div class="panel-title">Average Monthly Return</div>
    <div class="stats-chart-wrap"><canvas id="stats-chart"></canvas></div>
  </section>
</div>

<script src="/charts.js?v=4.0"></script>
<script>
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let currentIndex = "spx";
let statsChart;

/* --- Color helpers --- */
function cellColor(val) {
  if (val == null) return null;
  // Clamp magnitude at 15% for color scaling
  const mag = Math.min(Math.abs(val), 15) / 15;
  if (val >= 0) {
    // green: #34c673 at full, faded toward transparent
    const r = Math.round(52 * mag);
    const g = Math.round(198 * mag);
    const b = Math.round(115 * mag);
    return `rgba(${r}, ${g}, ${b}, ${0.25 + 0.65 * mag})`;
  } else {
    const r = Math.round(227 * mag);
    const g = Math.round(84 * mag);
    const b = Math.round(84 * mag);
    return `rgba(${r}, ${g}, ${b}, ${0.25 + 0.65 * mag})`;
  }
}

/* --- Index selector --- */
async function loadIndexList() {
  const r = await fetch("/api/indices");
  const list = await r.json();
  const sel = document.getElementById("index-select");
  sel.innerHTML = "";
  for (const i of list) {
    const opt = document.createElement("option");
    opt.value = i.key;
    opt.textContent = `${i.name} — ${i.country}`;
    sel.appendChild(opt);
  }
  sel.value = currentIndex;
  sel.addEventListener("change", () => { currentIndex = sel.value; refresh(); });
}

/* --- Heatmap table --- */
function renderHeatmap(data) {
  document.getElementById("heatmap-title").textContent = `${data.index_name} — Monthly Returns (%)`;
  const table = document.getElementById("heatmap-table");
  const thead = table.querySelector("thead tr");
  thead.innerHTML = "<th>Year</th>";
  for (const m of MONTHS) {
    thead.innerHTML += `<th>${m}</th>`;
  }

  const tbody = table.querySelector("tbody");
  tbody.innerHTML = "";
  for (const row of data.heatmap) {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td class="year-cell">${row.year}</td>`;
    for (const m of MONTHS) {
      const val = row[m];
      if (val == null) {
        tr.innerHTML += `<td class="val-cell null-cell">—</td>`;
      } else {
        const bg = cellColor(val);
        tr.innerHTML += `<td class="val-cell" style="background:${bg}">${val >= 0 ? "+" : ""}${val.toFixed(1)}</td>`;
      }
    }
    tbody.appendChild(tr);
  }
}

/* --- Stats bar chart --- */
function renderStatsChart(monthStats) {
  const labels = monthStats.map(s => s.month);
  const means = monthStats.map(s => s.mean);
  const R = RCCharts.regime, A = RCCharts.alpha;
  const bgColors = means.map(v => v >= 0 ? A(R.bull, 0.75) : A(R.bear, 0.75));
  const borderColors = means.map(v => v >= 0 ? R.bull : R.bear);

  if (statsChart) statsChart.destroy();
  const ctx = document.getElementById("stats-chart").getContext("2d");
  statsChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Mean Return (%)",
        data: means,
        backgroundColor: bgColors,
        borderColor: borderColors,
        borderWidth: 1,
        borderRadius: 3,
        borderSkipped: false,
      }],
    },
    options: {
      indexAxis: "y",
      scales: {
        x: {
          ticks: { callback: v => v.toFixed(1) + "%" },
        },
        y: {
          grid: { display: false },
        },
      },
      plugins: {
        legend: { display: false },
        /* rich multi-line stats need the native tooltip; the shared
           external tooltip renders one value per dataset only */
        tooltip: {
          enabled: true,
          external: null,
          callbacks: {
            label: function(ctx) {
              const s = monthStats[ctx.dataIndex];
              return [
                `Mean: ${s.mean >= 0 ? "+" : ""}${s.mean.toFixed(2)}%`,
                `Median: ${s.median >= 0 ? "+" : ""}${s.median.toFixed(2)}%`,
                `Std dev: ${s.std.toFixed(2)}%`,
                `Positive: ${s.positive_pct.toFixed(0)}% of months`,
                `Sample: ${s.count} years`,
              ];
            },
          },
        },
      },
    },
  });
}

/* --- Load data --- */
async function loadSeasonality() {
  const r = await fetch(`/api/seasonality?index=${currentIndex}`);
  const data = await r.json();
  renderHeatmap(data);
  renderStatsChart(data.month_stats);
}

async function refresh() {
  try { await loadSeasonality(); }
  catch (e) { console.error(e); }
}

function readQueryParams() {
  const p = new URLSearchParams(window.location.search);
  const idx = p.get("index");
  if (idx) currentIndex = idx;
}

(async () => {
  readQueryParams();
  await loadIndexList();
  await refresh();
})();
</script>

  if (sel && sel.value) renderShareButtons("share-container", sel.value, sel.options[sel.selectedIndex].textContent);
