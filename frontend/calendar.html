  <style>
    .calendar-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-top: 20px;
    }
    .calendar-table {
      border-collapse: separate;
      border-spacing: 1px;
    }
    .calendar-table th {
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 2;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      padding: 2px;
      text-align: center;
      white-space: nowrap;
    }
    .calendar-table th.year-label {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-strong);
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }
    .calendar-table th.index-header {
      position: sticky;
      left: 0;
      z-index: 3;
      background: var(--bg);
      text-align: left;
      padding: 4px 10px 4px 0;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-strong);
      white-space: nowrap;
      min-width: 100px;
    }
    .calendar-table td.index-name {
      position: sticky;
      left: 0;
      z-index: 1;
      background: var(--bg);
      text-align: left;
      padding: 2px 10px 2px 0;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-strong);
      white-space: nowrap;
      min-width: 100px;
    }
    .calendar-table td.cell {
      width: 18px;
      height: 18px;
      min-width: 18px;
      min-height: 18px;
      padding: 0;
      border-radius: 3px;
      cursor: default;
      transition: opacity 0.12s ease;
    }
    .calendar-table td.cell.bull    { background: var(--bull-chart); }
    .calendar-table td.cell.bear    { background: var(--bear-chart); }
    .calendar-table td.cell.neutral { background: var(--neutral-chart); }
    .calendar-table td.cell:hover   { opacity: 0.8; outline: 1.5px solid var(--text-strong); }

    .legend {
      display: flex;
      gap: 18px;
      align-items: center;
      margin-top: 18px;
      font-size: 12px;
      color: var(--muted);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      display: inline-block;
    }
    .legend-swatch.bull    { background: var(--bull-chart); }
    .legend-swatch.bear    { background: var(--bear-chart); }
    .legend-swatch.neutral { background: var(--neutral-chart); }

    /* month header row: keep them tiny */
    .calendar-table .month-labels th {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--muted);
      padding: 0 0 2px;
    }
  </style>

<body>
<script src="/shell.js?v=4.9"></script>

<div class="wrap">
  <div class="hero">
    <div class="kicker">Regime Calendar</div>
    <h1>Regime Calendar</h1>
    <div class="tagline">Monthly dominant regime for each market, from 2010 to today. Green is bull, red is bear, yellow is neutral.</div>
  </div>

  <section class="panel reveal">
    <div class="panel-title">Monthly regime heatmap</div>
    <div class="legend">
      <span class="legend-item"><span class="legend-swatch bull"></span> Bull</span>
      <span class="legend-item"><span class="legend-swatch bear"></span> Bear</span>
      <span class="legend-item"><span class="legend-swatch neutral"></span> Neutral</span>
    </div>
    <div class="calendar-wrap" id="calendar-wrap">
      <p style="color:var(--muted); font-size:13px;">Loading calendar&hellip;</p>
    </div>
  </section>
</div>

<script>
const MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function formatMonthLabel(ym) {
  const m = parseInt(ym.split('-')[1], 10);
  return MONTH_ABBR[m - 1];
}

function formatTooltip(indexName, ym, info) {
  const [y, m] = ym.split('-');
  const month = MONTH_ABBR[parseInt(m, 10) - 1];
  const regime = info.regime.charAt(0).toUpperCase() + info.regime.slice(1);
  return `${indexName} — ${month} ${y}: ${regime} (${info.pct.toFixed(0)}% of days)`;
}

async function load() {
  const data = await (await fetch('/api/calendar')).json();
  const months = data.months;
  const indices = data.indices;

  // Group months by year
  const years = [];
  const yearMonths = {};
  for (const ym of months) {
    const y = ym.split('-')[0];
    if (!yearMonths[y]) { yearMonths[y] = []; years.push(y); }
    yearMonths[y].push(ym);
  }

  const wrap = document.getElementById('calendar-wrap');

  // Build table
  const table = document.createElement('table');
  table.className = 'calendar-table';

  // Year header row
  const yearRow = document.createElement('tr');
  const cornerTh = document.createElement('th');
  cornerTh.className = 'index-header';
  yearRow.appendChild(cornerTh);
  for (const y of years) {
    const th = document.createElement('th');
    th.className = 'year-label';
    th.colSpan = yearMonths[y].length;
    th.textContent = y;
    yearRow.appendChild(th);
  }

  // Month header row
  const monthRow = document.createElement('tr');
  monthRow.className = 'month-labels';
  const cornerTh2 = document.createElement('th');
  cornerTh2.className = 'index-header';
  monthRow.appendChild(cornerTh2);
  for (const ym of months) {
    const th = document.createElement('th');
    th.textContent = formatMonthLabel(ym);
    monthRow.appendChild(th);
  }

  const thead = document.createElement('thead');
  thead.appendChild(yearRow);
  thead.appendChild(monthRow);
  table.appendChild(thead);

  // Data rows
  const tbody = document.createElement('tbody');
  for (const idx of indices) {
    const tr = document.createElement('tr');
    const nameTd = document.createElement('td');
    nameTd.className = 'index-name';
    nameTd.textContent = idx.index_name;
    tr.appendChild(nameTd);

    for (const ym of months) {
      const td = document.createElement('td');
      const info = idx.months[ym];
      if (info) {
        td.className = 'cell ' + info.regime;
        td.title = formatTooltip(idx.index_name, ym, info);
      } else {
        td.className = 'cell';
        td.style.background = 'var(--border)';
        td.title = `${idx.index_name} — ${ym}: No data`;
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);

  wrap.innerHTML = '';
  wrap.appendChild(table);
}

load();
</script>
</body>
