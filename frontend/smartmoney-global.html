/* ============================================================
   Smart Money Global — Taiwan / Indonesia / US
   One renderer, two feed flavours:
     blocks — anonymous block/negotiated deals (tw, id)
     deals  — named insider transactions with buy/sell (us)
   Consumes /api/smartmoney/<mkt>. No framework.
   ============================================================ */
(function () {
"use strict";

var POS = "var(--bull)", NEG = "var(--bear)", ACC = "var(--accent)";

var MARKETS = {

var esc = function (s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {

  });
};
var fmtDate = function (s) {
  return s ? new Date(s).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" }) : "";
};
var shortDate = function (s) { return new Date(s).toLocaleDateString("en-GB", { day: "numeric", month: "short" }); };

var pctStr = function (n) { return (n >= 0 ? "+" : "−") + Math.abs(n).toFixed(1) + "%"; };

function roleBucket(t) {
  t = (t || "").toLowerCase();

/* ============ single-series timeline + history (blocks) ============ */

function barsSVG(boxId, tipId, data, valOf, colorOf, legendHtml, labelOf) {
  var W = 1000, H = 260, padL = 10, padR = 10, padT = 16, padB = 26;
  var n = data.length || 1;
  var plotW = W - padL - padR, plotH = H - padT - padB;
  var maxV = Math.max.apply(null, data.map(function (d) { return Math.abs(valOf(d)); }).concat([1]));
  var band = plotW / n;
  var bw = Math.min(band * 0.62, 26);
  var xc = function (i) { return padL + band * (i + 0.5); };
  var tickStep = Math.ceil(n / 7);
  var baseY = H - padB;

  var bars = data.map(function (d, i) {
    var h = Math.max((Math.abs(valOf(d)) / maxV) * plotH, 1);
    return '<g class="g-bar" data-i="' + i + '">' +
      '<rect x="' + (xc(i) - band / 2) + '" y="' + padT + '" width="' + band + '" height="' + plotH + '" fill="transparent"/>' +
      '<rect x="' + (xc(i) - bw / 2) + '" y="' + (baseY - h) + '" width="' + bw + '" height="' + h + '" rx="2" fill="' + colorOf(d) + '"/>' +
      "</g>";
  }).join("");

  var ticks = data.map(function (d, i) { return i; }).filter(function (i) { return i % tickStep === 0; })
    .map(function (i) {
      return '<text x="' + xc(i) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="12">' + labelOf(data[i]) + "</text>";
    }).join("");

  return '<div class="surface-card chartbox" id="' + boxId + '">' +
    '<div class="legend-row">' + legendHtml + "</div>" +
    '<svg viewBox="0 0 ' + W + " " + H + '">' +
      '<line x1="' + padL + '" y1="' + baseY + '" x2="' + (W - padR) + '" y2="' + baseY + '" stroke="rgba(255,255,255,0.12)"/>' +
      bars + ticks +
    "</svg>" +
    '<div class="sm-tip" id="' + tipId + '"></div>' +
  "</div>";
}

/* buy above / sell below the zero line (deals flavour) */
function twoSideSVG(boxId, tipId, data, labelOf) {
  var W = 1000, H = 260, padL = 10, padR = 10, padT = 16, padB = 26;
  var n = data.length || 1;
  var plotW = W - padL - padR, plotH = H - padT - padB;
  var maxBuy = Math.max.apply(null, data.map(function (d) { return d.buy; }).concat([1]));
  var maxSell = Math.max.apply(null, data.map(function (d) { return d.sell; }).concat([1]));
  var zeroY = padT + plotH * (maxBuy / (maxBuy + maxSell));
  var band = plotW / n;
  var bw = Math.min(band * 0.62, 26);
  var xc = function (i) { return padL + band * (i + 0.5); };
  var tickStep = Math.ceil(n / 7);

  var bars = data.map(function (d, i) {
    var up = (d.buy / maxBuy) * (zeroY - padT);
    var dn = (d.sell / maxSell) * (padT + plotH - zeroY);
    return '<g class="g-bar" data-i="' + i + '">' +
      '<rect x="' + (xc(i) - band / 2) + '" y="' + padT + '" width="' + band + '" height="' + plotH + '" fill="transparent"/>' +
      '<rect x="' + (xc(i) - bw / 2) + '" y="' + (zeroY - up) + '" width="' + bw + '" height="' + Math.max(up, 0) + '" rx="2" fill="' + POS + '"/>' +
      '<rect x="' + (xc(i) - bw / 2) + '" y="' + zeroY + '" width="' + bw + '" height="' + Math.max(dn, 0) + '" rx="2" fill="' + NEG + '" opacity="0.75"/>' +
      "</g>";
  }).join("");

  var ticks = data.map(function (d, i) { return i; }).filter(function (i) { return i % tickStep === 0; })
    .map(function (i) {
      return '<text x="' + xc(i) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="12">' + labelOf(data[i]) + "</text>";
    }).join("");

  return '<div class="surface-card chartbox" id="' + boxId + '">' +
    '<div class="legend-row">' +
      '<span class="legend-key"><i style="background:' + POS + '"></i> insider buying</span>' +
      '<span class="legend-key"><i style="background:' + NEG + '"></i> insider selling</span>' +
      '<span class="legend-key" style="margin-left:auto">' + feed.meta.unit + "/day · last " + n + " sessions</span>" +
    "</div>" +
    '<svg viewBox="0 0 ' + W + " " + H + '">' +
      '<line x1="' + padL + '" y1="' + zeroY + '" x2="' + (W - padR) + '" y2="' + zeroY + '" stroke="rgba(255,255,255,0.12)"/>' +
      bars + ticks +
    "</svg>" +
    '<div class="sm-tip" id="' + tipId + '"></div>' +
  "</div>";
}

function bindHover(boxId, tipId, rows, htmlOf) {
  var box = document.getElementById(boxId);
  if (!box) return;
  var tip = document.getElementById(tipId);
  var groups = box.querySelectorAll("g[data-i]");
  groups.forEach(function (g) {
    g.addEventListener("pointerenter", function () {
      groups.forEach(function (x) { x.style.opacity = x === g ? 1 : 0.4; });
      tip.innerHTML = htmlOf(rows[+g.dataset.i]);
      var gr = g.getBoundingClientRect();
      var cx = gr.left + gr.width / 2 - box.getBoundingClientRect().left;
      tip.style.left = Math.max(84, Math.min(cx, box.clientWidth - 84)) + "px";
      tip.classList.add("show");
    });
  });
  box.addEventListener("pointerleave", function () {
    tip.classList.remove("show");
    groups.forEach(function (g) { g.style.opacity = 1; });
  });
}

function renderBlocks() {

      : kpi("Heaviest name", esc(k.top_stock || "—"), stocks[0] ? fmt(stocks[0].value) : null)) +
    kpi("Steady buildups", String(state.tab === "today" ? "—" : steady.length),

    "</div>";

  html += '<div class="blk">' + blockHead("Deal flow", "Total " + M.dealWord + " value per session — spikes mark days when big positions changed hands.") +
    barsSVG("tl-box", "tl-tip", feed.timeline,

      function (d) { return shortDate(d.date); }) + "</div>";

  /* sector flow first — the clearest actionable read on anonymous blocks */
  if (hasSectors && sectors.length) {

    html += '<div class="blk">' + blockHead("Where the money is flowing",

  var html = "";
  if (state.tab === "today" && w.date !== feed.meta.latest_date) {
    html += '<p class="quiet-note">' + fmtDate(feed.meta.latest_date) + " was a quiet session — showing the most recent day with material insider activity.</p>";
  }

  html += '<div class="dir-toggle">' +
    '<button class="dir-btn buy' + (isBuy ? " active" : "") + '" data-dir="buy"><span><span class="sub">buying ↑</span><br/><span class="lbl">Insider buys</span></span><span class="amt">+' + fmt(w.buy.kpi.total_value) + "</span></button>" +
    '<button class="dir-btn sell' + (!isBuy ? " active" : "") + '" data-dir="sell"><span><span class="sub">selling ↓</span><br/><span class="lbl">Insider sells</span></span><span class="amt">−' + fmt(w.sell.kpi.total_value) + "</span></button>" +
    "</div>";

  html += '<div class="kpi-band reveal in">' +
    kpi((isBuy ? "Bought" : "Sold") + " · " + tabWord, sign + fmt(k.total_value), "open-market only", true) +
    kpi("Stocks", k.n_stocks, "with ≥ " + fmt(feed.meta.min_value)) +
    kpi(isBuy ? "Insiders buying" : "Insiders selling", k.n_entities, null) +
    kpi("Heaviest", esc(k.top_stock || "—"), stocks[0] ? sign + fmt(stocks[0].value) : null) +
    "</div>";

  html += '<div class="blk">' + blockHead("Insider flow", "Daily open-market insider buying vs selling.") +
    twoSideSVG("tl-box", "tl-tip", feed.timeline, function (d) { return shortDate(d.date); }) + "</div>";

  var max = Math.max.apply(null, stocks.map(function (s) { return s.value; }).concat([1]));
  var actorNoun = isBuy ? "buyer" : "seller";
  var rows = stocks.map(function (s, i) {
    var actors = s.actors.map(function (a) {
      return '<div class="actor-row"><span class="dot" style="background:' + roleColor(a.etype) + '"></span>' +
        '<span class="who">' + esc(a.entity) + '</span>' +
        '<span class="role" style="color:' + roleColor(a.etype) + '">' + esc(roleBucket(a.etype)) + "</span>" +
        '<span class="amt" style="color:' + valColor + '">' + sign + fmt(a.value) + "</span></div>";
    }).join("");
    return '<div class="stock-row">' +
      '<button class="stock-btn" data-i="' + i + '">' +
        '<span class="rank">' + (i + 1) + "</span>" +
        '<span class="id"><span class="sym">' + esc(s.symbol) +
          (s.significant ? '<span class="sig-dot" style="background:' + valColor + '" title="Significant (≥ ' + fmt(feed.meta.significant) + ')"></span>' : "") +
        '</span><span class="sec">' + esc(s.security || "") + "</span></span>" +
        '<span class="barwrap"><span class="bar"><span style="width:' + Math.max((s.value / max) * 100, 3) + "%;background:" + valColor + '"></span></span></span>' +
        '<span class="amt"><span class="v" style="color:' + valColor + '">' + sign + fmt(s.value) + '</span><br/><span class="n">' + s.n_actors + " " + (s.n_actors === 1 ? actorNoun : actorNoun + "s") + "</span></span>" +
        '<span class="plus">+</span>' +
      "</button>" +
      '<div class="stock-detail"><div class="sec-name">' + esc(s.security) + "</div>" + actors + "</div>" +
    "</div>";
  }).join("");

  html += '<div class="sm-grid">';
  html += '<div class="blk" style="margin-bottom:0">' + blockHead(
      isBuy ? "What insiders are buying" : "What insiders are selling",
      "Ranked by net open-market " + (isBuy ? "purchases" : "sales") + ". Click a name to see who, by name and role.",
      stocks.length + " names") +
    (stocks.length ? '<div class="surface-card lead-list">' + rows + "</div>"
      : '<div class="surface-card empty">No insider ' + (isBuy ? "buying" : "selling") + " above " + fmt(feed.meta.min_value) + " this " + tabWord + ".</div>") +
    "</div>";

  html += '<div class="side-stack">';
  var cluster = stocks.filter(function (s) { return s.n_actors >= 2; })
    .sort(function (a, b) { return b.n_actors - a.n_actors; }).slice(0, 6);
  if (isBuy && cluster.length) {
    html += '<div class="blk">' + blockHead("Cluster buys", "Multiple insiders independently buying — the classic conviction signal.") +
      '<div class="surface-card">' +
      cluster.map(function (s) {
        var ticks = "";
        for (var i = 0; i < Math.min(s.n_actors, 12); i++) {
          ticks += '<span style="opacity:' + (0.4 + 0.6 * (1 - i / 12)).toFixed(2) + ';background:' + POS + '"></span>';
        }
        return '<div class="conv-row"><span class="sym">' + esc(s.symbol) + '</span>' +
          '<span class="ticks">' + ticks + '</span><span class="n">' + s.n_actors + '</span><span class="f">insiders</span></div>';
      }).join("") + "</div></div>";
  }
  html += '<div class="blk">' + blockHead(isBuy ? "Biggest buyers" : "Biggest sellers", "By name, across all their " + tabWord + " trades.") +
    (side.top_entities.length ? '<div class="surface-card">' +
      side.top_entities.map(function (e) {
        return '<div class="ent-row"><span class="dot" style="background:' + roleColor(e.etype) + '"></span>' +
          '<span class="who"><span class="nm">' + esc(e.entity) + '</span><br/><span class="ty">' + esc(e.etype) + " · " + e.n_names + (e.n_names === 1 ? " name" : " names") + "</span></span>" +
          '<span class="amt" style="color:' + valColor + '">' + sign + fmt(e.value) + "</span></div>";
      }).join("") + "</div>" : '<div class="surface-card empty">—</div>') + "</div>";
  html += "</div></div>";

  html += methodology();
  html += '<div class="blk">' + blockHead("The long view", "Insider buying vs selling per month.") +
    (function () {
      var data = feed.history;
      var W = 1000, H = 280, padL = 10, padR = 10, padT = 16, padB = 28;
      var n = data.length || 1;
      var plotW = W - padL - padR, plotH = H - padT - padB;
      var maxBuy = Math.max.apply(null, data.map(function (d) { return d.buy; }).concat([1]));
      var maxSell = Math.max.apply(null, data.map(function (d) { return d.sell; }).concat([1]));
      var zeroY = padT + plotH * (maxBuy / (maxBuy + maxSell));
      var band = plotW / n;
      var bw = Math.min(band * 0.5, 30);
      var bars = data.map(function (d, i) {
        var x = padL + band * (i + 0.5);
        var up = (d.buy / maxBuy) * (zeroY - padT);
        var dn = (d.sell / maxSell) * (padT + plotH - zeroY);
        return '<g class="g-bar" data-i="' + i + '">' +
          '<rect x="' + (x - band / 2) + '" y="' + padT + '" width="' + band + '" height="' + plotH + '" fill="transparent"/>' +
          '<rect x="' + (x - bw / 2) + '" y="' + (zeroY - up) + '" width="' + bw + '" height="' + Math.max(up, 0) + '" rx="2" fill="' + POS + '"/>' +
          '<rect x="' + (x - bw / 2) + '" y="' + zeroY + '" width="' + bw + '" height="' + Math.max(dn, 0) + '" rx="2" fill="' + NEG + '" opacity="0.75"/>' +
          "</g>";
      }).join("");
      var labels = data.map(function (d, i) {
        return '<text x="' + (padL + band * (i + 0.5)) + '" y="' + (H - 9) + '" text-anchor="middle" font-size="11">' +
          new Date(d.month + "-01").toLocaleDateString("en-GB", { month: "short" }) + "</text>";
      }).join("");
      return '<div class="surface-card chartbox" id="hist-box">' +
        '<div class="legend-row"><span class="legend-key"><i style="background:' + POS + '"></i> bought</span>' +
        '<span class="legend-key"><i style="background:' + NEG + '"></i> sold</span>' +
        '<span class="legend-key" style="margin-left:auto">' + feed.meta.unit + "/month</span></div>" +
        '<svg viewBox="0 0 ' + W + " " + H + '"><line x1="' + padL + '" y1="' + zeroY + '" x2="' + (W - padR) + '" y2="' + zeroY + '" stroke="rgba(255,255,255,0.12)"/>' + bars + labels + "</svg>" +
        '<div class="sm-tip" id="hist-tip"></div></div>';
    })() + "</div>";

  root.innerHTML = html;
  wireCommon();
  root.querySelectorAll(".dir-btn").forEach(function (b) {
    b.addEventListener("click", function () {
      if (state.dir !== b.dataset.dir) { state.dir = b.dataset.dir; render(); }
    });
  });
  bindHover("tl-box", "tl-tip", feed.timeline, function (d) {
    return '<div class="d">' + fmtDate(d.date) + '</div>' +
      '<div class="r"><span style="color:' + POS + '">Bought</span><span class="v">+' + fmt(d.buy) + "</span></div>" +
      '<div class="r"><span style="color:' + NEG + '">Sold</span><span class="v">−' + fmt(d.sell) + "</span></div>" +
      '<div class="r" style="border-top:1px solid var(--hairline);margin-top:5px;padding-top:5px"><span>Net</span><span class="v" style="color:' + pctColor(d.net) + '">' + (d.net >= 0 ? "+" : "−") + fmt(d.net) + "</span></div>";
  });
  bindHover("hist-box", "hist-tip", feed.history, function (d) {
    return '<div class="d">' + new Date(d.month + "-01").toLocaleDateString("en-GB", { month: "long", year: "numeric" }) + '</div>' +
      '<div class="r"><span style="color:' + POS + '">Bought</span><span class="v">+' + fmt(d.buy) + "</span></div>" +
      '<div class="r"><span style="color:' + NEG + '">Sold</span><span class="v">−' + fmt(d.sell) + "</span></div>";
  });
}

function methodology() {
  var s = feed.stats, m = feed.meta;
  var items = [
    ["Coverage", fmtDate(m.earliest_date) + " → " + fmtDate(m.latest_date)],
    ["Deals kept", (s.raw_deals || 0).toLocaleString()],
    ["Distinct names", String(s.distinct_symbols || 0)],
    ["Sessions", String(s.days || 0)],
    ["Materiality", "≥ " + fmt(m.min_value) + " per name"],
    ["Significant", "≥ " + fmt(m.significant)],
  ];
  if (s.distinct_entities) items[3] = ["Distinct insiders", String(s.distinct_entities)];
  return '<div class="blk reveal"><div class="panel" style="margin-bottom:0">' +
    '<h2 style="font-family:var(--font-display);font-size:19px;margin:0 0 6px;color:var(--text-strong)">How this is built</h2>' +
    '<p style="font-size:13px;color:var(--muted);line-height:1.6;max-width:760px;margin:0">' + M.meth + "</p>" +
    '<div class="meth-grid">' + items.map(function (kv) {
      return '<div class="cell"><span class="mono-lbl">' + kv[0] + '</span><div class="v">' + kv[1] + "</div></div>";
    }).join("") + "</div>" +
    '<div class="foot-note" style="margin-top:14px">Source: ' + esc(m.source) + ". Generated " + fmtDate(m.generated.slice(0, 10)) + ". Not investment advice.</div>" +
    "</div></div>";
}

function wireCommon() {
  document.getElementById("upd").textContent = "● updated " + fmtDate(feed.meta.latest_date) + " · daily";
  root.querySelectorAll(".stock-btn").forEach(function (b) {
    b.addEventListener("click", function () {
      var row = b.closest(".stock-row");
      if (row.querySelector(".stock-detail")) row.classList.toggle("open");
    });
  });
  if (window.RC) RC.reveal(root);
}

/* ============ congress view (US page second tab) ============ */

var PARTY = {
  Democrat: { c: "#3f9ae8", t: "D" },
  Republican: { c: "#e35454", t: "R" },
  Independent: { c: "#9aa3b2", t: "I" },
};
var partyOf = function (p) { return PARTY[p] || { c: "#9aa3b2", t: "?" }; };
function money(n) {
  n = Math.abs(n);
  if (n >= 1e9) return "$" + (n / 1e9).toFixed(1) + "bn";
  if (n >= 1e6) return "$" + (n / 1e6).toFixed(1) + "m";
  if (n >= 1e3) return "$" + Math.round(n / 1e3) + "k";
  return "$" + Math.round(n);
}
var range = function (lo, hi) { return money(lo) + (hi > lo ? "–" + money(hi) : ""); };
var lagDays = function (t, f) { return Math.round((new Date(f) - new Date(t)) / 86400000); };
var seatOf = function (p) {
  return (p.chamber === "Senate" ? "Senator · " : "Rep · ") + p.state +
    (p.district != null && p.chamber === "House" ? "-" + p.district : "");
};

function cgDetail(p) {
  var comm = p.committees.length
    ? '<div class="pd-comm"><strong>Committees:</strong> ' + p.committees.map(esc).join(" · ") + "</div>"
    : '<div class="pd-comm" style="color:var(--muted-2)">No current committee data.</div>';
  var list = function (title, items, color, sign) {
    return '<div class="pd-list"><div class="h">' + title + "</div>" +
      (items.length ? items.map(function (t) {
        return '<div class="pd-item"><span class="s">' + esc(t.symbol) + '</span>' +
          '<span class="a">' + esc(t.asset) + '</span>' +
          '<span class="v" style="color:' + color + '">' + sign + "~" + money(t.mid) +
          (t.n > 1 ? " ×" + t.n : "") + "</span></div>";
      }).join("") : '<div class="pd-item" style="color:var(--muted-2)">—</div>') + "</div>";
  };
  var rows = p.trades.slice(0, 15).map(function (t) {
    var lag = t.filed ? lagDays(t.date, t.filed) : null;
    return "<tr><td>" + fmtDate(t.date) + '</td><td style="font-weight:600;color:var(--text-strong)">' + esc(t.symbol) + "</td>" +
      '<td style="color:' + (t.side === "BUY" ? POS : NEG) + ';font-weight:600">' + (t.side === "BUY" ? "Buy" : "Sell") + "</td>" +
      '<td class="r">' + range(t.lo, t.hi) + "</td>" +
      '<td class="r" style="color:var(--muted)">' + (lag != null ? lag + "d later" : "—") + "</td></tr>";
  }).join("");
  return comm +
    '<div class="pd-grid">' +
      list("What they've been buying", p.top_buys, POS, "+") +
      list("What they've been selling", p.top_sells, NEG, "−") +
    "</div>" +
    '<table class="trades-tbl"><thead><tr><th>Traded</th><th>Stock</th><th>Side</th><th style="text-align:right">Size</th><th style="text-align:right">Disclosed</th></tr></thead><tbody>' +
    rows + "</tbody></table>" +
    (p.n_trades > 15 ? '<div class="foot-note" style="margin-top:8px">' + (p.n_trades - 15) + " earlier trades not shown</div>" : "");
}

function cgDirectory() {
  var q = cgState.q.toLowerCase();
  var pols = cgFeed.politicians.filter(function (p) {
    if (cgState.chamber !== "all" && p.chamber !== cgState.chamber) return false;
    if (cgState.party !== "all" && p.party !== cgState.party) return false;
    if (q && (p.name + " " + p.state + " " + p.committees.join(" ")).toLowerCase().indexOf(q) < 0) return false;
    return true;
  });
  if (!pols.length) return '<div class="surface-card empty">No politicians match.</div>';
  return '<div class="surface-card">' + pols.slice(0, 60).map(function (p) {
    var pc = partyOf(p.party);
    var net = p.buy_mid - p.sell_mid;
    return '<div class="pol-row" data-id="' + esc(p.id) + '">' +
      '<button class="pol-btn">' +
        '<span class="pt" style="color:' + pc.c + ";border-color:" + pc.c + "55;background:" + pc.c + '14">' + pc.t + "</span>" +
        '<span class="id2"><span class="nm">' + esc(p.name) + '</span><br/><span class="meta2">' + seatOf(p) +
          (p.committees.length ? " · " + esc(p.committees[0].replace(/^(House|Senate) Committee on /, "")) + (p.committees.length > 1 ? " +" + (p.committees.length - 1) : "") : "") +
        "</span></span>" +
        '<span class="amt3"><span class="v" style="color:' + (net >= 0 ? POS : NEG) + '">' + (net >= 0 ? "+" : "−") + "~" + money(net) + '</span><br/><span class="n">' + p.n_trades + " trades · net</span></span>" +
        '<span class="plus">+</span>' +
      "</button>" +
      '<div class="pol-detail"></div>' +
    "</div>";
  }).join("") + "</div>" +
  (pols.length > 60 ? '<div class="foot-note" style="margin-top:8px">Showing top 60 of ' + pols.length + " — refine the search to see more.</div>" : "");
}

function renderCongress() {
  if (!cgFeed) {
    root.innerHTML = '<div class="skeleton" style="height:300px;margin-top:22px"></div>';
    fetch("/api/smartmoney/congress")
      .then(function (r) { return r.json(); })
      .then(function (d) { cgFeed = d; renderCongress(); })
      .catch(function () {
        root.innerHTML = '<div class="surface-card empty">Couldn\'t load the Congress feed. Try refreshing.</div>';
      });
    return;
  }
  if (!cgFeed.politicians || !cgFeed.politicians.length) {
    root.innerHTML = '<div class="surface-card empty">No filings ingested yet — the first fetch is running.</div>';
    return;
  }
  var o = cgFeed.overview, m = cgFeed.meta;
  var topBuy = o.top_bought[0];
  var mostActive = cgFeed.politicians[0];

  document.getElementById("period").textContent = "STOCK Act disclosures · up to 45d lag";
  document.getElementById("upd").textContent = "● latest trade " + fmtDate(m.latest_trade) + " · daily";
  var v = document.getElementById("verdict");
  if (topBuy) {
    v.innerHTML = '<span class="live-dot"></span> <span>Congress\'s most-bought stock over the last ' + m.recent_days + " days is <strong>" +
      esc(topBuy.symbol) + "</strong> (~" + money(topBuy.mid) + " across " + topBuy.n_politicians +
      (topBuy.n_politicians === 1 ? " politician" : " politicians") + ")" +
      (mostActive ? ' <span style="color:var(--muted-2)">·</span> biggest recent trader: <strong>' + esc(mostActive.name) + "</strong> (" + esc(mostActive.party) + ", " + esc(mostActive.state) + ")" : "") +
      "</span>";
    v.style.display = "";
  }

  var html = '<div class="kpi-band reveal in">' +
    kpi("Politicians tracked", m.n_politicians, "with disclosed stock trades", true) +
    kpi("Trades on file", m.n_trades.toLocaleString(), "since " + fmtDate(m.coverage_from)) +
    kpi("Hottest buy · " + m.recent_days + "d", topBuy ? esc(topBuy.symbol) : "—", topBuy ? "~" + money(topBuy.mid) + " · " + topBuy.n_politicians + " politicians" : null) +
    kpi("Biggest trader · " + m.recent_days + "d", mostActive ? esc(mostActive.name.split(" ").slice(-1)[0]) : "—", mostActive ? "~" + money(mostActive.recent_mid) + " · " + mostActive.n_trades + " trades on file" : null) +
    "</div>";

  var tickList = function (items, color, sign) {
    return '<div class="surface-card">' + (items.length ? items.slice(0, 10).map(function (t) {
      return '<div class="tick-row"><span class="sym">' + esc(t.symbol) + '</span>' +
        '<span class="who">' + t.politicians.map(esc).join(", ") + '</span>' +
        '<span class="amt2" style="color:' + color + '">' + sign + "~" + money(t.mid) + "</span>" +
        '<span class="n">' + t.n_politicians + (t.n_politicians === 1 ? " member" : " members") + "</span></div>";
    }).join("") : '<div class="empty">Nothing material in the window.</div>') + "</div>";
  };

  html += '<div class="sm-grid" style="grid-template-columns:1fr 1fr">';
  html += '<div class="blk" style="margin-bottom:0">' + blockHead("What Congress is buying",
    "Biggest disclosed purchases in the last " + m.recent_days + " days. More members = broader conviction.") + tickList(o.top_bought, POS, "+") + "</div>";
  html += '<div class="blk" style="margin-bottom:0">' + blockHead("What Congress is selling",
    "Biggest disclosed sales in the last " + m.recent_days + " days.") + tickList(o.top_sold, NEG, "−") + "</div>";
  html += "</div>";

  html += '<div class="blk">' + blockHead("Politician portfolios",
      "Click a name for their committees, top holdings traded, and full trade log. \"Net\" = disclosed buys minus sells (range midpoints).",
      m.n_politicians + " tracked") +
    '<div class="dir-controls">' +
      '<input id="cg-q" type="search" placeholder="Search name, state or committee — e.g. Pelosi, TX, Armed Services" value="' + esc(cgState.q) + '" />' +
      '<button class="fchip' + (cgState.chamber === "all" ? " active" : "") + '" data-f="chamber:all">Both</button>' +
      '<button class="fchip' + (cgState.chamber === "Senate" ? " active" : "") + '" data-f="chamber:Senate">Senate</button>' +
      '<button class="fchip' + (cgState.chamber === "House" ? " active" : "") + '" data-f="chamber:House">House</button>' +
      '<button class="fchip' + (cgState.party === "all" ? " active" : "") + '" data-f="party:all">All parties</button>' +
      '<button class="fchip' + (cgState.party === "Democrat" ? " active" : "") + '" data-f="party:Democrat" style="color:#3f9ae8">Dem</button>' +
      '<button class="fchip' + (cgState.party === "Republican" ? " active" : "") + '" data-f="party:Republican" style="color:#e35454">Rep</button>' +
    "</div>" +
    '<div id="cg-dir">' + cgDirectory() + "</div></div>";

  html += '<div class="blk">' + blockHead("Latest disclosures",
      "Newest filings first. \"After\" shows how long after the trade the filing landed — the STOCK Act allows up to 45 days.") +
    '<div class="surface-card">' + o.recent.slice(0, 20).map(function (r) {
      var pc = partyOf(r.party);
      return '<div class="filing-row"><span class="d">' + fmtDate(r.filed) + "</span>" +
        '<span class="who2"><span style="color:' + pc.c + ';font-weight:700">' + pc.t + '</span> ' + esc(r.name) + " · " + esc(r.state) + "</span>" +
        '<span class="fsym">' + esc(r.symbol) + "</span>" +
        '<span class="side" style="color:' + (r.side === "BUY" ? POS : NEG) + '">' + (r.side === "BUY" ? "BUY" : "SELL") + "</span>" +
        '<span class="rng">' + range(r.lo, r.hi) + "</span>" +
        '<span class="lag">' + lagDays(r.date, r.filed) + "d after</span></div>";
    }).join("") + "</div></div>";

  html += '<div class="blk"><div class="panel" style="margin-bottom:0">' +
    '<h2 style="font-family:var(--font-display);font-size:19px;margin:0 0 6px;color:var(--text-strong)">How this is built</h2>' +
    '<p style="font-size:13px;color:var(--muted);line-height:1.6;max-width:760px;margin:0">Senators and representatives must disclose every securities trade under the STOCK Act. We pull the official filings daily — Senate eFD periodic transaction reports and the House Clerk\'s disclosure files — keep stock trades, join each filer to their party, state and committees, and aggregate per politician. Amounts are legal disclosure ranges (e.g. $15k–$50k), never exact; totals use range midpoints, marked with ~. Filings may lag trades by up to 45 days: read this as positioning, not daily flow.</p>' +
    '<div class="foot-note" style="margin-top:14px">Source: ' + esc(m.source) + ". Generated " + fmtDate(m.generated.slice(0, 10)) + ". Not investment advice.</div>" +
    "</div></div>";

  root.innerHTML = html;

  var q = document.getElementById("cg-q");
  var wireDir = function () {
    root.querySelectorAll(".pol-btn").forEach(function (b) {
      b.addEventListener("click", function () {
        var row = b.closest(".pol-row");
        if (!row.classList.contains("open")) {
          var p = cgFeed.politicians.filter(function (x) { return x.id === row.dataset.id; })[0];
          if (p) row.querySelector(".pol-detail").innerHTML = cgDetail(p);
        }
        row.classList.toggle("open");
      });
    });
  };
  q.addEventListener("input", function () {
    cgState.q = q.value;
    document.getElementById("cg-dir").innerHTML = cgDirectory();
    wireDir();
  });
  root.querySelectorAll(".fchip").forEach(function (c) {
    c.addEventListener("click", function () {
      var kv = c.dataset.f.split(":");
      cgState[kv[0]] = kv[1];
      renderCongress();
      document.getElementById("cg-q").focus();
    });
  });
  wireDir();
  if (window.RC) RC.reveal(root);
}

function render() {
  var winTabs = document.getElementById("tab-window");
  if (mkt === "us" && state.view === "congress") {
    winTabs.style.display = "none";
    renderCongress();
    return;
  }
  winTabs.style.display = "";
  if (!feed || !feed.today) {
    root.innerHTML = '<div class="surface-card empty">No data yet for this market — the first fetch runs after the next market close.</div>';
    return;
  }
  if (feed.meta.flavor === "deals") renderDeals();
  else renderBlocks();
}

document.addEventListener("DOMContentLoaded", function () {
  if (!window.RC) return;
  RC.tabs(document.getElementById("tab-window"), function (key) { state.tab = key; render(); });
  if (mkt === "us") {
    var tv = document.getElementById("tab-view");
    tv.style.display = "";
    RC.tabs(tv, function (key) { state.view = key; render(); });
    if (location.pathname.indexOf("congress") >= 0 || location.hash === "#congress") {
      state.view = "congress";
      tv.querySelectorAll(".tab").forEach(function (t) {
        t.classList.toggle("active", t.dataset.tab === "congress");
      });
      render();
    }
  }
});

fetch("/api/smartmoney/" + mkt)
  .then(function (r) { return r.json(); })
  .then(function (d) { feed = d; render(); })
  .catch(function () {
    root.innerHTML = '<div class="surface-card empty">Couldn\'t load the feed. Try refreshing.</div>';
  });
})();
</script>
</body>
</html>
